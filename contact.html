<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 漢方薬株式会社</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <a href="index.html" class="header__logo">漢方薬 株式会社</a>
      <nav class="nav">
        <a href="index.html" class="nav__link">サイトトップ</a>
        <a href="about.html" class="nav__link">会社概要</a>
        <a href="products.html" class="nav__link">製品一覧</a>
        <a href="history.html" class="nav__link">沿革</a>
        <a href="contact.html" class="nav__link nav__link--current">お問い合わせ</a>
      </nav>
    </header>

    <main class="main">
      <section class="page-title-band">
        <h1 class="page-title-band__title">お問い合わせ</h1>
        <p class="page-title-band__sub">Contact</p>
      </section>

      <section class="form-section">
        <h2 class="form-section__title">お問い合わせフォーム</h2>
        <form action="#" method="post" class="form">
          <div class="form-group">
            <label for="name" class="form-group__label">お名前（必須）</label>
            <input type="text" id="name" name="name" class="form-group__input" required placeholder="お名前を入力">
          </div>
          <div class="form-group">
            <label for="email" class="form-group__label">メールアドレス（必須）</label>
            <input type="email" id="email" name="email" class="form-group__input" required placeholder="メールアドレスを入力">
          </div>
          <div class="form-group">
            <label for="message" class="form-group__label">お問い合わせ内容</label>
            <textarea id="message" name="message" class="form-group__textarea" placeholder="お問い合わせ内容を入力"></textarea>
          </div>
          <button type="submit" class="btn btn--primary">送信する</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__logo">漢方薬 株式会社</p>
      <nav class="footer__nav">
        <a href="index.html" class="footer__link">サイトトップ</a>
        <a href="about.html" class="footer__link">会社概要</a>
        <a href="products.html" class="footer__link">製品一覧</a>
        <a href="history.html" class="footer__link">沿革</a>
        <a href="contact.html" class="footer__link">お問い合わせ</a>
        <a href="sitemap.html" class="footer__link">サイトマップ</a>
      </nav>
      <p class="footer__copy">© 2025 漢方薬株式会社 All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
